name: Reusable workflow to run smoke tests on different k8s versions

on:
  workflow_call:

jobs:
  smoke-tests:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - AMD64
          - ARM64
        kindVersion:
          # renovate: datasource=docker depName=kindest/node
          - v1.34.3
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.33.7
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.32.11
        include:
          - arch: AMD64
            runner: ubuntu-latest
          - arch: ARM64
            runner: ubuntu-24.04-arm
    uses: kedacore/keda/.github/workflows/template-smoke-tests.yml@main
    with:
      runs-on: ${{ matrix.runner }}
      kubernetesVersion: ${{ matrix.kindVersion }}
      kindImage: kindest/node:${{ matrix.kindVersion }}

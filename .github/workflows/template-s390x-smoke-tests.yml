name: Reusable workflow to run smoke tests on s390x

on:
  workflow_call:

jobs:
  smoke-tests-s390x:
    name: Validate k8s
    runs-on: s390x
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install prerequisites
        run: |
          apt update
          apt install curl make ca-certificates gcc libc-dev wget -y
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Kubernetes
        env:
          # renovate: datasource=github-releases depName=kubernetes-sigs/kind
          KIND_VERSION: v0.29.0
          # renovate: datasource=docker depName=vishnubijukumar/kindest-node-s390x
          KINDEST_NODE_S390X_VERSION: v1.35.0
          # renovate: datasource=docker depName=vishnubijukumar/kindnetd
          KINDNETD_S390X_VERSION: v20250512-s390x
          # renovate: datasource=docker depName=vishnubijukumar/local-path-provisioner
          LOCAL_PATH_PROVISIONER_S390X_VERSION: v1
        run: |
          go install sigs.k8s.io/kind@${KIND_VERSION}
          kind create cluster --name ${{ runner.name }} --image vishnubijukumar/kindest-node-s390x:${KINDEST_NODE_S390X_VERSION}
          kubectl -n kube-system set image daemonset/kindnet kindnet-cni=docker.io/vishnubijukumar/kindnetd:${KINDNETD_S390X_VERSION}
          kubectl -n local-path-storage set image deployment/local-path-provisioner local-path-provisioner=docker.io/vishnubijukumar/local-path-provisioner:${LOCAL_PATH_PROVISIONER_S390X_VERSION}

          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/s390x/kubectl"
          chmod +x kubectl
          mkdir -p ~/.local/bin
          mv ./kubectl ~/.local/bin/kubectl
          kubectl version

      - name: Run smoke test
        run: make smoke-test

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ always() }}
        with:
          name: smoke-test-logs ${{ inputs.runs-on }}-${{ inputs.kubernetesVersion }}
          path: "${{ github.workspace }}/**/*.log"
          if-no-files-found: ignore

      - name: Remove Kubernetes
        run: |
          kind delete cluster --name ${{ runner.name }}
        if: ${{ always() }}
        env:
          DEBIAN_FRONTEND: noninteractive

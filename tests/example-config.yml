# This is an example test config file to be used with the run-all.go file.
keda:
  installKeda: true # e2e tests will setup KEDA for you
  installKafka: true # e2e tests will setup Kafka for you
  imageRegistry: "" # use KEDA images from registry
  imageRepo: "" # use KEDA images from repo
# The e2e launcher will only run the cpu scaler test.
testCategories:
  internals:
    mode: exclude
  scalers:
    mode: include
    tests:
      - cpu
  secret-providers:
    mode: exclude
  sequential:
    mode: exclude

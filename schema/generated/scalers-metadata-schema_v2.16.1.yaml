kedaVersion: 2.16.1
schemaVersion: 1
scalers:
    - type: activemq
      metadata:
        - name: managementEndpoint
          type: string
          optional: true
        - name: destinationName
          type: string
          optional: true
        - name: brokerName
          type: string
          optional: true
        - name: username
          type: string
          canReadFromEnv: true
          canReadFromAuth: true
        - name: password
          type: string
          canReadFromEnv: true
          canReadFromAuth: true
        - name: corsHeader
          type: string
          optional: true
        - name: restAPITemplate
          type: string
          optional: true
        - name: targetQueueSize
          type: string
          optional: true
          default: "10"
        - name: activationTargetQueueSize
          type: string
          optional: true
          default: "0"
    - type: apache-kafka
      metadata:
        - name: bootstrapServers
          type: string
          canReadFromEnv: true
        - name: consumerGroup
          type: string
          canReadFromEnv: true
        - name: topic
          type: string
          optional: true
          canReadFromEnv: true
        - name: partitionLimitation
          type: string
          optional: true
          rangeSeparator: '-'
        - name: lagThreshold
          type: string
          default: "10"
        - name: activationLagThreshold
          type: string
          default: "0"
        - name: offsetResetPolicy
          type: string
          default: latest
          allowedValue:
            - earliest
            - latest
        - name: allowIdleConsumers
          type: string
          optional: true
        - name: excludePersistentLag
          type: string
          optional: true
        - name: scaleToZeroOnInvalidOffset
          type: string
          optional: true
        - name: limitToPartitionsWithLag
          type: string
          optional: true
        - name: sasl
          type: string
          default: none
          allowedValue:
            - none
            - plaintext
            - scram_sha256
            - scram_sha512
            - gssapi
            - aws_msk_iam
          canReadFromAuth: true
        - name: username
          type: string
          optional: true
          canReadFromAuth: true
        - name: password
          type: string
          optional: true
          canReadFromAuth: true
        - name: awsRegion
          type: string
          optional: true
        - name: awsEndpoint
          type: string
          optional: true
        - name: tls
          type: string
          default: disable
          allowedValue:
            - enable
            - disable
          canReadFromAuth: true
        - name: cert
          type: string
          optional: true
          canReadFromAuth: true
        - name: key
          type: string
          optional: true
          canReadFromAuth: true
        - name: keyPassword
          type: string
          optional: true
          canReadFromAuth: true
        - name: ca
          type: string
          optional: true
          canReadFromAuth: true
    - type: arangodb
      metadata:
        - name: endpoints
          type: string
          canReadFromAuth: true
        - name: collection
          type: string
        - name: query
          type: string
        - name: queryValue
          type: string
          default: "0"
        - name: activationQueryValue
          type: string
          default: "0"
        - name: unsafeSsl
          type: string
          default: "false"
        - name: connectionLimit
          type: string
          optional: true
    - type: aws-cloudwatch
      metadata:
        - name: namespace
          type: string
          optional: true
        - name: metricName
          type: string
          optional: true
        - name: dimensionName
          type: string
          optional: true
          separator: ;
        - name: dimensionValue
          type: string
          optional: true
          separator: ;
        - name: expression
          type: string
          optional: true
        - name: targetMetricValue
          type: string
        - name: activationTargetMetricValue
          type: string
          optional: true
        - name: minMetricValue
          type: string
        - name: ignoreNullValues
          type: string
          optional: true
          default: "true"
        - name: metricCollectionTime
          type: string
          optional: true
          default: "300"
        - name: metricStat
          type: string
          optional: true
          default: Average
        - name: metricUnit
          type: string
          optional: true
        - name: metricStatPeriod
          type: string
          optional: true
          default: "300"
        - name: metricEndTimeOffset
          type: string
          optional: true
          default: "0"
        - name: awsRegion
          type: string
          canReadFromAuth: true
        - name: awsEndpoint
          type: string
          optional: true
    - type: aws-dynamodb
      metadata:
        - name: tableName
          type: string
        - name: awsRegion
          type: string
          canReadFromAuth: true
        - name: awsEndpoint
          type: string
          optional: true
        - name: keyConditionExpression
          type: string
        - name: indexName
          type: string
          optional: true
        - name: targetValue
          type: string
          optional: true
          default: "-1"
        - name: activationTargetValue
          type: string
          default: "0"
    - type: aws-dynamodb-streams
      metadata:
        - name: shardCount
          type: string
          default: "2"
        - name: activationShardCount
          type: string
          default: "0"
        - name: tableName
          type: string
        - name: awsRegion
          type: string
          canReadFromAuth: true
        - name: awsEndpoint
          type: string
          optional: true
    - type: aws-kinesis-stream
